# ذاكرة ضعيفة / paging file صغير (1455): heap صغير + تعطيل daemon يقلل ضغط الرام وقت flutter run.
org.gradle.daemon=false
org.gradle.jvmargs=-Xmx768m -Xms128m -XX:MaxMetaspaceSize=256m -XX:ReservedCodeCacheSize=96m -XX:+UseSerialGC -XX:+HeapDumpOnOutOfMemoryError
org.gradle.workers.max=1
org.gradle.parallel=false
kotlin.daemon.jvmargs=-Xmx384m -XX:MaxMetaspaceSize=128m
android.useAndroidX=true
